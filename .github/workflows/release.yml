name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historique complet pour le changelog

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true

      - name: Dépendances
        run: flutter pub get

      - name: Génération de code (freezed / drift / retrofit)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Tests
        run: flutter test

      # Keystore de signature stable (optionnel). Sans secret → clé debug.
      - name: Préparer le keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"
          fi

      # APK PROD (universel) : vrai Odoo (URL depuis la variable MICA_ODOO_URL).
      - name: Build APK prod
        env:
          ODOO_URL: ${{ vars.MICA_ODOO_URL }}
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=MICA_DEMO=false \
            --dart-define=MICA_ODOO_URL="${ODOO_URL:-https://staging.radoran.net}"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/mica-fleet-${GITHUB_REF_NAME}.apk"

      # APK DÉMO (universel) : applicationId .demo → coexiste avec la prod.
      - name: Build APK démo
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release -Pdemo=true --dart-define=MICA_DEMO=true
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/mica-fleet-${GITHUB_REF_NAME}-demo.apk"
          ls -lh dist

      - name: Générer le changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          RANGE="${PREV:+$PREV..}${TAG}"
          {
            echo "## ${TAG}"
            echo
            if [ -n "$PREV" ]; then
              echo "Changements depuis ${PREV} :"
            else
              echo "Première release :"
            fi
            echo
            git log $RANGE --pretty='- %s' --no-merges
            echo
            echo "### APK (universel)"
            echo "- \`mica-fleet-${TAG}.apk\` — **prod** (connecté à Odoo)"
            echo "- \`mica-fleet-${TAG}-demo.apk\` — **démo** (faux backend + données locales)"
          } > RELEASE_CHANGELOG.md
          cat RELEASE_CHANGELOG.md

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mica-fleet-${{ github.ref_name }}-apk
          path: dist/*.apk

      - name: Publier la release
        uses: softprops/action-gh-release@v2
        with:
          name: mica-fleet ${{ github.ref_name }}
          body_path: RELEASE_CHANGELOG.md
          files: dist/*.apk
